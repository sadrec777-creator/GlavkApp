name: Cloud Compile APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Fix Directory Structure
        run: |
          echo "=== Проверка структуры папок ==="
          # Если скрипт находит дублирующуюся папку app/app, он сам переносит всё содержимое в правильное место
          if [ -d "app/app" ]; then
            echo "Найдена ошибочная вложенность app/app. Исправляю на лету..."
            find app/app/ -maxdepth 1 -mindepth 1 -exec mv -t app/ {} +
            rm -rf app/app
          fi
          echo "=== Итоговая структура перед компиляцией ==="
          find . -not -path '*/.*'

      - name: Build Application
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: GlavkApp-Finished
          path: app/build/outputs/apk/debug/app-debug.apk
